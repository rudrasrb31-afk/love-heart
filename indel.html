<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Heart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
}
</style>

</head>
<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const TEXT_COUNT = 100;
const particles = [];

function heart(t){
    return {
        x: 16 * Math.pow(Math.sin(t),3),
        y:
            13 * Math.cos(t)
            - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t)
            - Math.cos(4*t)
    };
}

for(let i=0;i<TEXT_COUNT;i++){
    particles.push({
        offset:(i/TEXT_COUNT)*Math.PI*2
    });
}

let time = 0;

function animate(){

    requestAnimationFrame(animate);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const scale = Math.min(canvas.width,canvas.height)/42;

    time += 0.004;

    const drawList = [];

    particles.forEach(p=>{

        const t = p.offset + time;

        const pos = heart(t);

        const depth = (Math.sin(t)+1)/2;

        drawList.push({
            x: canvas.width/2 + pos.x*scale,
            y: canvas.height/2 - pos.y*scale,
            depth
        });

    });

    drawList.sort((a,b)=>a.depth-b.depth);

    drawList.forEach(item=>{

        const size = 10 + item.depth*8;

        const alpha = 0.25 + item.depth*0.75;

        ctx.save();

        ctx.translate(item.x,item.y);

        /* fixed viewing angle */
        ctx.rotate(-0.25);

        ctx.font = `${size}px Arial`;

        ctx.fillStyle = `rgba(255,182,193,${alpha})`;

        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 8;

        ctx.fillText("love you",-28,0);

        ctx.restore();

    });

}

animate();

</script>

</body>
</html>
